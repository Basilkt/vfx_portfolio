<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammed Basil KT | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- 1. Global Settings --- */
        body {
            margin: 0; padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: #030712; 
            color: #ffffff;
            overflow-x: hidden;
        }

        /* --- THE SCROLL PROGRESS BAR --- */
        .scroll-progress-bar {
            position: fixed; top: 0; left: 0; width: 0%; height: 4px;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            z-index: 99999; transition: width 0.1s;
        }

        /* --- 2. PREMIUM CINEMATIC BACKGROUND ATMOSPHERE --- */
        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -4; pointer-events: none;
        }

        .bg-blob {
            position: fixed; width: 800px; height: 800px;
            background: radial-gradient(#2563eb, transparent 60%);
            opacity: 0.1; border-radius: 50%; z-index: -3;
            filter: blur(100px); animation: float 25s infinite alternate; pointer-events: none;
        }
        .blob-1 { top: -200px; left: -200px; }
        .blob-2 { bottom: -200px; right: -200px; background: radial-gradient(#8b5cf6, transparent 60%); }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(80px, 80px); } }

        /* Holographic Floating VFX Words */
        .vfx-bg-particles {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            overflow: hidden; z-index: -2; pointer-events: none;
        }
        .vfx-logo-particle {
            position: absolute; bottom: -200px;
            font-weight: 900; letter-spacing: 2px;
            text-transform: uppercase; white-space: nowrap;
            color: transparent; 
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.05); 
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.03); 
            animation: floatUp linear infinite;
        }

        .blur-heavy { filter: blur(6px); opacity: 0.3; z-index: -3; } 
        .blur-med { filter: blur(3px); opacity: 0.6; z-index: -2; }   
        .blur-light { filter: blur(1px); opacity: 0.8; z-index: -1; } 

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(-5deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-130vh) rotate(5deg); opacity: 0; }
        }

        .p1 { left: 5%; font-size: 8rem; animation-duration: 45s; animation-delay: 0s; }
        .p2 { left: 35%; font-size: 4rem; animation-duration: 35s; animation-delay: 5s; }
        .p3 { left: 70%; font-size: 6rem; animation-duration: 50s; animation-delay: 12s; }
        .p4 { left: 15%; font-size: 3rem; animation-duration: 30s; animation-delay: 20s; }
        .p5 { left: 80%; font-size: 5rem; animation-duration: 40s; animation-delay: 2s; }
        .p6 { left: 55%; font-size: 7rem; animation-duration: 48s; animation-delay: 18s; }
        .p7 { left: 85%; font-size: 9rem; animation-duration: 55s; animation-delay: 25s; }
        .p8 { left: 25%; font-size: 4.5rem; animation-duration: 38s; animation-delay: 10s; }

        /* --- 3. CENTERED NAVBAR --- */
        .top-nav {
            padding: 30px 50px; 
            position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
            background: transparent; transition: all 0.4s ease-in-out; box-sizing: border-box;
            display: flex; justify-content: space-between; align-items: center; 
        }
        .top-nav.scrolled {
            padding: 15px 50px; background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-left, .nav-right { flex: 1; display: flex; }
        .nav-right { justify-content: flex-end; }
        .nav-links { flex: 2; display: flex; gap: 35px; justify-content: center; align-items: center; }
        .nav-links a {
            color: #e2e8f0; text-decoration: none; font-weight: 500; font-size: 1.05rem;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: #8b5cf6; } 

        .nav-btn {
            padding: 8px 22px; border: 2px solid #8b5cf6; color: #a78bfa; 
            border-radius: 30px; text-decoration: none; font-weight: 500; transition: all 0.3s;
        }
        .nav-btn:hover { background: rgba(139, 92, 246, 0.1); transform: scale(1.05); }

        /* --- 4. Main Hero Section --- */
        .hero-container {
            min-height: 100vh; display: flex; align-items: center; justify-content: space-between;
            max-width: 1200px; margin: 0 auto; padding: 0 50px; gap: 20px;
        }

        .hero-text { flex: 1; text-align: left; z-index: 2; }
        .greeting { font-size: 5rem; font-weight: 800; line-height: 1; margin-bottom: 20px; }
        .name-highlight {
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .terminal-box { margin-bottom: 30px; }
        .terminal-line {
            font-family: 'Courier New', monospace; font-size: 1.3rem;
            color: #4ade80; margin: 5px 0; font-weight: 600;
        }

        .cursor { display: inline-block; width: 3px; background-color: #4ade80; margin-left: 2px; animation: blink 1s infinite; }
        .cursor.typing { animation: none; }
